_format_version: "3.0"
services:
  - name: user-service
    url: http://user-service.default.svc.cluster.local:8000
    routes:
      - name: users-route
        paths:
          - /users
        strip_path: false
        plugins:
          - name: jwt
          - name: rate-limiting
            config:
              minute: 10
              policy: local
          - name: ip-restriction
            config:
              # Demo allow localhost:
              allow:
                - 127.0.0.1/32
              # To demonstrate deny, replace above with an unrelated IP (e.g., 8.8.8.8/32)
      - name: health-route
        paths:
          - /health
        strip_path: false
      - name: verify-route
        paths:
          - /verify
        strip_path: false
      - name: login-route
        paths:
          - /login
        strip_path: false
      - name: register-route
        paths:
          - /register
        strip_path: false

consumers:
  - username: robo
    jwt_secrets:
      - key: robokey
        secret: robosecret
